# picom.conf — Modern compositor config for Awesome WM
# Blur + Rounded Corners + Shadows + Fading
# Place at: ~/.config/picom/picom.conf

# ── Backend ─────────────────────────────────────────────────
backend     = "glx";
vsync       = true;
glx-no-stencil = true;

# ── Rounded corners ─────────────────────────────────────────
corner-radius = 10;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3lock'",
];

# ── Shadows ─────────────────────────────────────────────────
shadow          = true;
shadow-radius   = 15;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity  = 0.4;
shadow-color    = "#000000";
shadow-exclude  = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
];

# ── Fading (smooth open/close) ───────────────────────────────
fading          = true;
fade-in-step    = 0.03;
fade-out-step   = 0.03;
fade-delta      = 5;
fade-exclude    = [];

# ── Blur (background blur like Hyprland) ────────────────────
blur-method     = "dual_kawase";
blur-strength   = 7;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;
blur-kern       = "3x3box";
blur-exclude    = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3lock'",
];

# ── Opacity ─────────────────────────────────────────────────
active-opacity   = 1.0;
inactive-opacity = 0.92;
frame-opacity    = 1.0;
inactive-opacity-override = false;
opacity-rule = [
    "100:class_g = 'kitty' && focused",
    "90:class_g  = 'kitty' && !focused",
    "100:class_g = 'Alacritty' && focused",
    "90:class_g  = 'Alacritty' && !focused",
    "100:class_g = 'Brave-browser'",
    "100:class_g = 'Wavebox'",
];

# ── Window type settings ─────────────────────────────────────
wintypes: {
    tooltip      = { fade = true; shadow = false; opacity = 0.9; focus = true; full-shadow = false; };
    dock         = { shadow = false; clip-shadow-above = true; };
    dnd          = { shadow = false; };
    popup_menu   = { opacity = 0.95; shadow = true; corner-radius = 8; };
    dropdown_menu = { opacity = 0.95; shadow = true; corner-radius = 8; };
    notification = { shadow = true; corner-radius = 10; };
};
